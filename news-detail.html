<!DOCTYPE HTML>
<html>
	<head>
		<title>News | Tumu Siime</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" />
		<link rel="stylesheet" href="css/style.css" />
        
        <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:400,400italic" rel="stylesheet" />

		<style>
			#main-article { max-width: 900px; margin: 0 auto; padding: 4em 2em; }
			.back-link { text-decoration: none; font-weight: bold; display: inline-block; margin-bottom: 2em; color: #49bf9d; }
			.featured-image { width: 100%; border-radius: 10px; margin-bottom: 2.5em; }
		</style>
	</head>
	<body>
		<div id="main-article">
			<a href="index.html#news" class="back-link">&larr; Back to News</a>
			<header><h1 id="render-title">Loading...</h1><span id="render-date"></span></header>
			<div id="render-image-container"></div>
			<div id="render-body"></div>
		</div>

		<script src="https://cdn.jsdelivr.net/npm/@contentful/rich-text-html-renderer@15.12.1/dist/rich-text-html-renderer.browser.min.js"></script>

		<script>
			const SPACE_ID = 'be0zo8d325rr';
			const ACCESS_TOKEN = 'uqXfxvVFw_-jamkuPpoPCKkFMBPxs5ERl_Bj0YrPRL8';
			
			const urlParams = new URLSearchParams(window.location.search);
			const entryId = urlParams.get('id');

			if (entryId) {
                // FIXED: Use HTTPS for API calls
				const url = `https://cdn.contentful.com/spaces/${SPACE_ID}/entries/${entryId}?access_token=${ACCESS_TOKEN}&include=1`;

				fetch(url)
					.then(res => res.json())
					.then(data => {
						const fields = data.fields;
						document.getElementById('render-title').innerText = fields.title;
                        
                        // Render body
                        if (typeof contentfulRichTextHtmlRenderer !== 'undefined') {
    						const renderedHtml = contentfulRichTextHtmlRenderer.documentToHtmlString(fields.body);
    						document.getElementById('render-body').innerHTML = renderedHtml;
                        } else {
                            console.error("Renderer library not loaded!");
                        }
					})
					.catch(err => console.error("Fetch Error:", err));
			}
		</script>
	</body>
</html>
